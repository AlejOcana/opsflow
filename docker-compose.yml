services:
  db:
    image: postgres:16-alpine
    container_name: opsflow-db
    environment:
      POSTGRES_DB: opsflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opsflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opsflow-network

  api:
    build:
      context: ./opsflow-api
      dockerfile: Dockerfile
    container_name: opsflow-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=opsflow;Username=postgres;Password=postgres"
      Jwt__Secret: "OpsFlowSecretKey1234567890123456789012345678901234567890"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:5000"
    networks:
      - opsflow-network
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./opsflow-web
      dockerfile: Dockerfile
    container_name: opsflow-web
    ports:
      - "4200:80"
    networks:
      - opsflow-network
    depends_on:
      - api

volumes:
  pgdata:

networks:
  opsflow-network:
    driver: bridge